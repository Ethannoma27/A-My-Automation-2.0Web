<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>产品链接同步请求</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style> 

    html, body {
    height: 100%;
    min-height: 100vh;
   }
    body {
      margin: 0;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
      color: #e0e6ff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2rem;
      color: #f0c14b;
      margin-bottom: 10px;
    }

    header p {
      color: #aaa;
      font-size: 0.95rem;
    }

    .bulk-form {
      max-width: 480px;
      margin: 0 auto;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      color: #ddd;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .bulk-form h3 {
      margin-bottom: 20px;
      color: #f0c14b;
      font-size: 1.4rem;
    }

    .bulk-form input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2b2b2b;
      color: #fff;
      font-size: 0.95rem;
    }

    .bulk-form input:focus {
      border-color: #f0c14b;
      outline: none;
    }
.submit-btn {
  background: #f0c14b;
  color: #222;
  font-weight: bold;
  border: none;
  padding: 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  width: 100%;
  transition: background 0.25s ease, box-shadow 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.submit-btn:hover {
  background: #e6b93d; /* 略深的金黄，保持风格统一 */
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}

.submit-btn:active {
  background: #d6a736; /* 再深一点，点击时有反馈 */
  box-shadow: 0 3px 6px rgba(0,0,0,0.25);
}


    .form-status {
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 24px;
      color: #99ccff;
    } 

    *, *::before, *::after {
    box-sizing: border-box;
    
    }
  </style>
</head>
<body> 

  <header>
    <h1>产品链接同步</h1>
    <p>请输入你想同步的产品链接，我们会为你快速处理</p>
  </header>

  <div class="bulk-form">
    <h3><i class="fa-solid fa-paper-plane"></i> 输入产品链接</h3>
    <form id="syncForm">
      <input type="url" name="url" placeholder="🔗 请输入产品链接 (URL)" required />
      <input type="password" name="password" placeholder="🔒 访问密码 (可选)" />
      <button type="submit" class="submit-btn"><i class="fa-solid fa-share-from-square"></i> 发送同步请求</button>
      <p class="form-status" id="formStatus"></p>
    </form>
  </div>

  <script>
const formStatus = document.getElementById("formStatus");
const syncForm = document.getElementById("syncForm");

syncForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const submitBtn = syncForm.querySelector("button[type='submit']");
  submitBtn.disabled = true;
  formStatus.textContent = "⏳ 同步中...";

  const formData = new FormData(syncForm);
  const data = {
    url: formData.get("url"),
    password: formData.get("password") || ""
  };

  try {
    const response = await fetch("https://your-pipedream-webhook-url.mydomain.com", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    if(response.ok) {
      formStatus.textContent = "✅ 同步请求已成功发送！";
      syncForm.reset();
    } else {
      const resJson = await response.json();
      formStatus.textContent = "❌ 同步失败: " + (resJson.error || response.statusText);
      submitBtn.disabled = false;
    }
  } catch (error) {
    formStatus.textContent = "❌ 网络错误，请稍后重试";
    submitBtn.disabled = false;
  }
});

  </script>

</body>





</html>
