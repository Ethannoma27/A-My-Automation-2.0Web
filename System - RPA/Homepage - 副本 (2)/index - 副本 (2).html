<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiMiner 机械·科幻 首页</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: 'Orbitron', sans-serif;
    }
    /* LOGO 区（沿用你之前 sci-fi 样式） */
    .logo-panel {
      position: absolute; top: 20px; left: 20px;
      padding: 16px; border-radius: 14px;
      background: linear-gradient(145deg, #2e2e2e, #1a1a1a);
      border: 2px solid #00dfff;
      box-shadow: 0 0 16px rgba(0,223,255,0.6), inset 0 0 8px rgba(255,255,255,0.1);
      display: flex; align-items: center;
    }
    .logo-panel img {
      height: 60px; margin-right: 14px;
    }

    /* 顶部导航 */
    nav {
      width: 100%; padding: 20px 40px;
      display: flex; justify-content: flex-end; gap: 30px;
      background: rgba(0,0,0,0.4);
    }
    nav a {
      color: #11BAFC;
      text-decoration: none;
      font-size: 18px;
      position: relative;
    }
    nav a::after {
      content: ""; position: absolute;
      left: 0; bottom: -4px;
      width: 0; height: 2px;
      background: #11BAFC;
      transition: width 0.3s;
    }
    nav a:hover::after {
      width: 100%;
    }

    /* 主横幅 */
    .hero {
      height: 60vh;
      background: url('hero-bg.jpg') center/cover no-repeat;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding-left: 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 223, 255, 0.15);
      mix-blend-mode: overlay;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    .hero h1 {
      font-size: 48px;
      color: #3caefa;
      text-shadow: 0 0 10px #3caefa;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 24px;
      color: #d4af37;
      text-shadow: 0 0 8px #d4af37;
      margin-bottom: 24px;
    }
    .hero .cta {
      padding: 12px 28px;
      font-size: 20px;
      color: #0f0f0f;
      background: #11BAFC;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(17,186,252,0.6);
      transition: transform 0.2s;
    }
    .hero .cta:hover {
      transform: scale(1.05);
    }

    /* 产品预览区 */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 24px;
      padding: 40px;
    }
    .product-card {
      background: #1b1b1b;
      padding: 16px;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 8px rgba(0,223,255,0.3);
      transition: transform 0.3s;
    }
    .product-card:hover { transform: translateY(-6px); }
    .product-card::after {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        45deg,
        rgba(17,186,252,0.08), rgba(17,186,252,0.08) 1px,
        transparent 1px, transparent 6px
      );
      pointer-events: none;
    }
    .product-card h3 { color: #11BAFC; margin-bottom: 8px; }
    .product-card p { color: #fff; margin-bottom: 12px; }
    .product-card button {
      padding: 8px 16px;
      background: #d4af37;
      color: #0f0f0f;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(212,175,55,0.5);
    }

    /* 页脚 */
    footer {
      padding: 24px 40px;
      background: #02011E;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- 左上角 Logo 模块 -->
  <div class="logo-panel">
    <img src="LOGO.png" alt="Hiwin Logo">
    <div>
      <div style="font-size:24px;color:#3caefa;">Hi</div>
      <div style="font-size:28px;color:#d4af37;">Miner</div>
    </div>
  </div>

  <!-- 顶部导航 -->
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <!-- 主横幅 -->
  <section class="hero">
    <h1>Unlock High‑Tech Mining</h1>
    <p>Advanced ASICs & Futuristic Gear for Next‑Gen Crypto</p>
    <button class="cta">Explore Now</button>
  </section>

  <!-- 产品展示 -->
  <section class="products">
    <div class="product-card">
      <h3>ASIC Miner X100</h3>
      <p>High performance. Low energy.</p>
      <button>Buy Now</button>
    </div>
    <div class="product-card">
      <h3>Quantum Rig Pro</h3>
      <p>Next-level mining efficiency.</p>
      <button>Buy Now</button>
    </div>
    <div class="product-card">
      <h3>Cyber Cooling Unit</h3>
      <p>Keep your rigs icy.</p>
      <button>Buy Now</button>
    </div>
    <!-- 可按需增加更多卡片 -->
  </section>

  <!-- 页脚版权信息 -->
  <footer>
    © 2025 HiMiner Labs — All rights reserved.
  </footer>
</body>
</html>
