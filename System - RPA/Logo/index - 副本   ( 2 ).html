<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HIWIN LOGO</title>
  <style>
    body {
      background-color: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    .logo-symbol {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #3a8ee6, #1c1c1c);
      clip-path: polygon(0% 0%, 100% 0%, 70% 100%, 0% 100%);
      margin-bottom: 10px;
      filter: drop-shadow(0 0 12px rgba(58,142,230,0.5));
    }

.logo-text {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 2px;
  color: #e0e0e0;
  background: linear-gradient(90deg, #5c9ded, #1a1a1a);
  padding: 4px 10px;
  border-radius: 6px;
  box-shadow: inset 0 0 12px rgba(58,142,230,0.15), 0 0 6px rgba(58,142,230,0.25);
}

    .logo-tagline {
      font-size: 12px;
      color: #999999;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
  </style>
</head>
<body>

  <div class="logo-container">
    <div class="logo-symbol"></div>
    <div class="logo-text">HIWIN</div>
    <div class="logo-tagline">CRYPTOMINER SERIES</div>
  </div>

</body>
</html>
