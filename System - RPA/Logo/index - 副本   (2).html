<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGO图片与文字上下边缘对齐</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #ffffff; /* 整体页面为白色背景 */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .top-logo {
      display: flex;
      align-items: center;
    }

.logo-box {
  position: relative;
  background-color: #1b1b1b;
  border-radius: 14px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: center;

  /* 外发光边框 */
  box-shadow:
    0 0 12px rgba(0, 255, 255, 0.4),       /* 青色外发光 */
    0 0 24px rgba(0, 255, 255, 0.2),       /* 更远发光 */
    inset 0 0 4px rgba(255, 255, 255, 0.08), /* 内反光 */
    inset 0 4px 6px rgba(255, 255, 255, 0.1); /* 上部高光 */

  background-image:
    linear-gradient(145deg, #2e2e2e, #1a1a1a),  /* 金属面底色 */
    radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent); /* 光照渐变 */

  border: 2px solid #888; /* 边框是银灰色 */
}


    .logo-box img {
      height: 90px;
      width: auto;
      display: block;
    }
    

    .text-box {
      background-color: #0f0f0f; /* 黑色背景，仅包住文字 */
      padding: 12px 20px;
      border-radius: 8px;
      margin-left: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 90px;
    }

    /* Hi 的样式 */
    .hiwin-text.cyan div:first-child {
      font-weight: 900;
      font-size: 48px;
      letter-spacing: 8px;
      color: #3caefa;
      text-shadow:
        0 0 8px #66baff,
        0 0 15px #3399ff,
        0 0 20px #1a75ff,
        0 2px 5px rgba(0,0,139,0.8);
      animation: bounce 2s ease-in-out infinite;
      user-select: none;
    }

    /* Miner 的样式 */
    .hiwin-text.cyan div:last-child {
      font-size: 50px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #d4af37;
      text-shadow:
        0 0 10px rgba(212, 175, 55, 0.95),
        0 2px 6px rgba(0, 0, 0, 0.85);
      user-select: none;
      line-height: 1;
      margin: 0;
    }

    .hiwin-text.cyan {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      font-weight: 900;
      font-family: 'Orbitron', sans-serif;
    }

    .hiwin-text.cyan div {
      line-height: 45px;
      font-size: 45px;
      user-select: none;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.1); }
    }

    .main-logo {
      font-size: 60px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #d4af37;
      text-shadow:
        0 0 10px rgba(212, 175, 55, 0.95),
        0 2px 6px rgba(0, 0, 0, 0.85);
      user-select: none;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="top-logo">
      <!-- 左边 logo 图片带黑色边框 -->
      <div class="logo-box">
        <img src="hiwin-logo.png" alt="Hiwin Logo" />
      </div>

      <!-- 右边 Hi / Miner 在黑色背景下 -->
      <div class="text-box">
        <div class="hiwin-text cyan">
          <div>Hi</div>
          <div>Miner</div>
        </div>
      </div>
    </div>
    <div class="main-logo"></div>
  </div>
</body>




</html>
