<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoMinerBros Full Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-smooth: antialiased;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .logo-container {
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px;
    }

    .top-logo {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .top-logo img {
      height: 80px;
      width: auto;
      margin-right: 16px;
      filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.8));
    }

    .hiwin-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 50px;
      font-weight: 900;
      color: #d4af37;
      letter-spacing: 0.5px;
      text-shadow:
        0 0 6px rgba(212, 175, 55, 0.9),
        0 2px 4px rgba(0, 0, 0, 0.7);
      user-select: none;
      line-height: 1;
    }

    .main-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 60px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #d4af37;
      text-shadow:
        0 0 10px rgba(212, 175, 55, 0.95),
        0 2px 6px rgba(0, 0, 0, 0.85);
      user-select: none;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="top-logo">
      <img src="hiwin-logo.png" alt="Hiwin Logo" />
      <div class="hiwin-text">Hiwin</div>
    </div>
    <div class="main-logo">Miner</div>
  </div>
</body>






</html>
