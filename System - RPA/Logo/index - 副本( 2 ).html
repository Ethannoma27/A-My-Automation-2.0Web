<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoMinerBros Style Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 52px;              /* 稍微放大 */
      font-weight: 700;             /* 更粗一点 */
      text-transform: uppercase;
      letter-spacing: 1px;          /* 稍微收紧 */ 

      color: #d4af37;               /* 更深的蓝绿 */
      text-shadow: 0 1px 2px #000;  /* 轻微阴影增加厚感 */
    }
  </style>
</head>
<body>
  <div class="logo">Crypto Miner</div>
</body>
</html>
