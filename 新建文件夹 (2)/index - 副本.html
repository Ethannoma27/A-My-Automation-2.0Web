<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>亚马逊标题处理 & 原创标题生成</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; }
    button { padding: 10px 20px; }
    .output { margin-top: 20px; white-space: pre-wrap; background: #f5f5f5; padding: 15px; border-radius: 5px; }
  </style>
</head>
<body>

  <h2>输入亚马逊产品标题（每行一个）</h2>

  <textarea id="amazonTitles" placeholder="例如：&#10;Wireless Bluetooth Headphones Noise Cancelling&#10;Portable Bluetooth Earbuds with Charging Case"></textarea>

  <button id="generateBtn">生成原创标题 & 关键词</button>

  <div class="output" id="result"></div>

  <script>
    const btn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const rawInput = document.getElementById('amazonTitles').value.trim();
      if (!rawInput) {
        alert('请输入至少一个亚马逊标题');
        return;
      }
      const titles = rawInput.split('\n').map(t => t.trim()).filter(t => t.length > 0);

      resultDiv.textContent = '处理中，请稍候...';

      try {
        // 调用后端API示例 (这里是伪接口)
        const response = await fetch('/.netlify/functions/process-amazon-titles', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amazonTitles: titles })
        });

        if (!response.ok) throw new Error('服务器返回错误');

        const data = await response.json();

        // data 示例格式：
        // {
        //   generatedTitles: [ "SoundPro 蓝牙降噪耳机 - 限时优惠", ...],
        //   extractedKeywords: ["蓝牙", "降噪", "耳机"]
        // }

        let outputText = '【原创生成标题】\n' + data.generatedTitles.join('\n') + '\n\n';
        outputText += '【提取关键词】\n' + data.extractedKeywords.join(', ');

        resultDiv.textContent = outputText;

      } catch (err) {
        resultDiv.textContent = '错误：' + err.message;
      }
    });
  </script>

</body>


</html>
